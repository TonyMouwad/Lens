<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner</title>
<style>
body{ text-align:center; background:#111; color:#fff; font-family:Arial;}
video{ width:90%; max-width:400px; border-radius:12px;}
#scan{ display:none;}
#overlay{
 position:absolute;
 top:50%; left:50%;
 width:250px; height:250px;
 transform:translate(-50%,-50%);
 border:3px solid #00ffcc;
 border-radius:15px;
 pointer-events:none;
}
</style>
</head>
<body>

<h2>Scan the Card</h2>

<div style="position:relative; display:inline-block;">
<video id="video" autoplay playsinline></video>
<div id="overlay"></div>
</div>

<canvas id="scan" width="300" height="300"></canvas>

<h1 id="output">...</h1>

<script>

function binaryToText(binary){
  let text="";
  for(let i=0;i<binary.length;i+=8){
    let byte=binary.slice(i,i+8);
    let code=parseInt(byte,2);
    if(!isNaN(code) && code>0){
      text+=String.fromCharCode(code);
    }
  }
  return text;
}

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
 video:{facingMode:"environment"}
}).then(stream=>{
 video.srcObject=stream;
 scan();
});

function scan(){
 const canvas=document.getElementById("scan");
 const ctx=canvas.getContext("2d");

 ctx.drawImage(video,0,0,300,300);

 const size=20;
 const start=60;
 const area=180;
 const cell=area/size;

 let binary="";

 for(let y=2;y<size-2;y++){
  for(let x=2;x<size-2;x++){

   let px=Math.floor(start+(x+0.5)*cell);
   let py=Math.floor(start+(y+0.5)*cell);

   let data=ctx.getImageData(px,py,1,1).data;
   let avg=(data[0]+data[1]+data[2])/3;

   binary += avg<140 ? "1":"0";
  }
 }

 let result=binaryToText(binary);
 document.getElementById("output").innerText=result;

 requestAnimationFrame(scan);
}

</script>
</body>
</html>
