<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Scanner</title>
<style>
body{ text-align:center; background:#111; color:#fff;}
video{ width:90%; max-width:400px;}
#scan{ display:none;}
</style>
</head>
<body>

<h2>Scan Color Card</h2>
<video id="video" autoplay playsinline></video>
<canvas id="scan" width="300" height="300"></canvas>

<h1 id="output">...</h1>

<script>

function closestColor(r,g,b){

 const palette=[
  {bits:"00", r:255,g:0,b:0},
  {bits:"01", r:0,g:255,b:0},
  {bits:"10", r:0,g:0,b:255},
  {bits:"11", r:255,g:255,b:0}
 ];

 let minDist=999999;
 let best="00";

 for(let c of palette){
  let dist=(r-c.r)**2+(g-c.g)**2+(b-c.b)**2;
  if(dist<minDist){
   minDist=dist;
   best=c.bits;
  }
 }

 return best;
}

function binaryToText(binary){
 let text="";
 for(let i=0;i<binary.length;i+=8){
  let byte=binary.slice(i,i+8);
  let code=parseInt(byte,2);
  if(!isNaN(code)&&code>0){
   text+=String.fromCharCode(code);
  }
 }
 return text;
}

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
 video:{facingMode:"environment"}
}).then(stream=>{
 video.srcObject=stream;
 scan();
});

function scan(){

 const canvas=document.getElementById("scan");
 const ctx=canvas.getContext("2d");

 ctx.drawImage(video,0,0,300,300);

 const size=16;
 const cell=300/size;

 let binary="";

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){

   let px=Math.floor((x+0.5)*cell);
   let py=Math.floor((y+0.5)*cell);

   let data=ctx.getImageData(px,py,1,1).data;

   binary+=closestColor(data[0],data[1],data[2]);
  }
 }

 document.getElementById("output").innerText=binaryToText(binary);

 requestAnimationFrame(scan);
}

</script>
</body>
</html>
