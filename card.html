<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Card</title>
<style>
body{ text-align:center; font-family:Arial;}
canvas{ margin-top:40px;}
</style>
</head>
<body>

<h2>Color Encrypted (LOVE)</h2>
<canvas id="pattern" width="400" height="400"></canvas>

<script>

const text = "LOVE";

function textToBinary(text){
 let binary="";
 for(let i=0;i<text.length;i++){
  binary += text.charCodeAt(i).toString(2).padStart(8,"0");
 }
 return binary;
}

function draw(binary){
 const canvas=document.getElementById("pattern");
 const ctx=canvas.getContext("2d");

 const size=16;
 const cell=canvas.width/size;

 const colors={
  "00":"#ff0000",
  "01":"#00ff00",
  "10":"#0000ff",
  "11":"#ffff00"
 };

 let i=0;

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   let bits=binary.slice(i,i+2);
   i+=2;

   if(bits.length<2) bits="00";

   ctx.fillStyle=colors[bits];
   ctx.fillRect(x*cell,y*cell,cell,cell);
  }
 }
}

draw(textToBinary(text));

</script>
</body>
</html>
