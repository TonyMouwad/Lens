<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pattern Demo</title>
<style>
body { text-align:center; font-family: Arial; }
canvas, video { width:300px; margin:10px; }
</style>
</head>
<body>

<h2>الصورة المشفرة (محبة)</h2>
<canvas id="pattern" width="256" height="256"></canvas>

<h2>امسح الكارت بالكاميرا</h2>
<video id="video" autoplay playsinline></video>
<canvas id="scan" width="256" height="256"></canvas>

<h3 id="output"></h3>

<script>
// ====== النص ======
const text = "محبة";

// ====== تحويل لنظام binary ======
function textToBinary(text) {
  let binary = "";
  for (let char of text) {
    let code = char.charCodeAt(0);
    binary += code.toString(2).padStart(16, "0");
  }
  return binary;
}

// ====== رسم pattern ======
function drawPattern(binary) {
  const canvas = document.getElementById("pattern");
  const ctx = canvas.getContext("2d");

  const size = 16;
  const cell = canvas.width / size;

  let i = 0;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      let bit = binary[i] || "0";

      ctx.fillStyle = bit === "1" ? "#000" : "#fff";
      ctx.fillRect(x * cell, y * cell, cell, cell);

      i++;
    }
  }
}

// ====== Binary → نص ======
function binaryToText(binary) {
  let text = "";

  for (let i = 0; i < binary.length; i += 16) {
    let chunk = binary.slice(i, i + 16);
    let code = parseInt(chunk, 2);

    if (!isNaN(code) && code > 0) {
      text += String.fromCharCode(code);
    }
  }

  return text;
}

// ====== تشغيل الكاميرا ======
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => video.srcObject = stream);

// ====== قراءة الصورة ======
function scan() {
  const canvas = document.getElementById("scan");
  const ctx = canvas.getContext("2d");

  ctx.drawImage(video, 0, 0, 256, 256);

  const size = 16; // نفس اللي في الرسم
  const cell = 256 / size;

  let binary = "";

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      // ناخد نقطة من نص المربع
      let px = Math.floor((x + 0.5) * cell);
      let py = Math.floor((y + 0.5) * cell);

      let data = ctx.getImageData(px, py, 1, 1).data;

      let avg = (data[0] + data[1] + data[2]) / 3;

      binary += avg < 128 ? "1" : "0";
    }
  }

  let result = binaryToText(binary);

  document.getElementById("output").innerText = result;

  requestAnimationFrame(scan);
}

// ====== تشغيل ======
const binary = textToBinary(text);
drawPattern(binary);
scan();

</script>

</body>
</html>
