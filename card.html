<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOVE Card</title>
<style>
body{ text-align:center; font-family:Arial; background:#f5f5f5;}
canvas{ margin-top:40px; border:8px solid black;}
</style>
</head>
<body>

<h2>Encrypted Image (LOVE)</h2>
<canvas id="pattern" width="400" height="400"></canvas>

<script>

const text = "LOVE";

function textToBinary(text){
  let binary="";
  for(let i=0;i<text.length;i++){
    binary += text.charCodeAt(i).toString(2).padStart(8,"0");
  }
  return binary;
}

function draw(binary){
  const canvas=document.getElementById("pattern");
  const ctx=canvas.getContext("2d");

  const size=20; // أكبر شوية
  const cell=canvas.width/size;

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let i=0;

  for(let y=2;y<size-2;y++){
    for(let x=2;x<size-2;x++){
      let bit=binary[i]||"0";
      ctx.fillStyle= bit==="1" ? "#000" : "#fff";
      ctx.fillRect(x*cell,y*cell,cell,cell);
      i++;
    }
  }

  // markers
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,cell*3,cell*3);
  ctx.fillRect(canvas.width-cell*3,0,cell*3,cell*3);
  ctx.fillRect(0,canvas.height-cell*3,cell*3,cell*3);
}

draw(textToBinary(text));

</script>
</body>
</html>
