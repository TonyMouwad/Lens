<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Scanner احترافي</title>

<style>
body {
  text-align:center;
  font-family: Arial;
  background:#111;
  color:#fff;
}

/* الكاميرا */
#video {
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
}

/* إطار التصويب */
#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 220px;
  height: 220px;
  transform: translate(-50%, -50%);
  border: 3px solid #00ffcc;
  border-radius: 12px;
  pointer-events: none;
}

/* نخفي الكانفاس */
#scan {
  display: none;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<h2>📱 وجّه الكاميرا نحو الكود</h2>

<div style="position:relative; display:inline-block;">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>

<canvas id="scan" width="256" height="256"></canvas>

<h2>النتيجة:</h2>
<h1 id="output">...</h1>

<script>

// ====== النص ======
const text = "محبة";

// ====== تحويل لنظام binary ======
function textToBinary(text) {
  let binary = "";
  for (let char of text) {
    let code = char.charCodeAt(0);
    binary += code.toString(2).padStart(16, "0");
  }
  return binary;
}

// ====== Binary → نص ======
function binaryToText(binary) {
  let text = "";

  for (let i = 0; i < binary.length; i += 16) {
    let chunk = binary.slice(i, i + 16);
    let code = parseInt(chunk, 2);

    if (!isNaN(code) && code > 0) {
      text += String.fromCharCode(code);
    }
  }

  return text;
}

// ====== تشغيل الكاميرا ======
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
  scan();
});

// ====== قراءة ======
function scan() {
  const canvas = document.getElementById("scan");
  const ctx = canvas.getContext("2d");

  ctx.drawImage(video, 0, 0, 256, 256);

  const size = 16;
  const start = 40;
  const area = 180;

  const cell = area / size;

  let binary = "";

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      let px = Math.floor(start + (x + 0.5) * cell);
      let py = Math.floor(start + (y + 0.5) * cell);

      let data = ctx.getImageData(px, py, 1, 1).data;

      let avg = (data[0] + data[1] + data[2]) / 3;

      binary += avg < 140 ? "1" : "0";
    }
  }

  let result = binaryToText(binary);

  document.getElementById("output").innerText = result;

  requestAnimationFrame(scan);
}

</script>

</body>
</html>
