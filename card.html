<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الكارت المشفر</title>
<style>
body { text-align:center; font-family:Arial; background:#f5f5f5; }
canvas { margin-top:30px; border:8px solid #000; }
button { padding:10px 20px; margin:20px; }
</style>
</head>
<body>

<h2>الصورة المشفرة (محبة)</h2>
<canvas id="pattern" width="400" height="400"></canvas>
<br>
<button onclick="download()">تحميل الصورة للطباعة</button>

<script>

const text = "محبة";

function textToBinary(text) {
  let binary = "";
  for (let char of text) {
    let code = char.charCodeAt(0);
    binary += code.toString(2).padStart(16, "0");
  }
  return binary;
}

function drawPattern(binary) {
  const canvas = document.getElementById("pattern");
  const ctx = canvas.getContext("2d");

  const size = 16;
  const cell = canvas.width / size;

  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let i = 0;

  for (let y = 2; y < size-2; y++) {
    for (let x = 2; x < size-2; x++) {

      let bit = binary[i] || "0";

      ctx.fillStyle = bit === "1" ? "#000" : "#fff";
      ctx.fillRect(x * cell, y * cell, cell, cell);

      i++;
    }
  }

  // markers
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,cell*2,cell*2);
  ctx.fillRect(canvas.width-cell*2,0,cell*2,cell*2);
  ctx.fillRect(0,canvas.height-cell*2,cell*2,cell*2);
}

function download() {
  const canvas = document.getElementById("pattern");
  const link = document.createElement("a");
  link.download = "mahaba.png";
  link.href = canvas.toDataURL();
  link.click();
}

const binary = textToBinary(text);
drawPattern(binary);

</script>

</body>
</html>
