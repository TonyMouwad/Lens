<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Filter</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Tajawal;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.viewer{
    width:95%;
    max-width:500px;
    margin-top:20px;
    position:relative;
    border-radius:20px;
    overflow:hidden;
    border:2px solid #333;
}

canvas{
    width:100%;
}

.scan-line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ff88;
    animation:scan 3s linear infinite;
}

@keyframes scan{
    from{top:0}
    to{top:100%}
}

button{
    margin-top:20px;
    padding:15px;
    width:250px;
    border:none;
    border-radius:15px;
    background:#d4af37;
    font-weight:bold;
    font-size:16px;
}
</style>
</head>

<body>

<h2>نظام الفلتر الضوئي</h2>

<div class="viewer">
<div class="scan-line"></div>
<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>
</div>

<button onclick="startCamera()">تشغيل الكاميرا</button>
<button onclick="edgeMode=!edgeMode">تبديل Edge Mode</button>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let edgeMode = false;

async function startCamera(){

    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment",
                width:1280,
                height:720
            }
        });

        video.srcObject = stream;

        video.onloadedmetadata = ()=>{
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            render();
        }

    }catch(e){
        alert("اسمح بالوصول للكاميرا");
    }
}

function render(){

    if(video.paused || video.ended) return;

    ctx.drawImage(video,0,0);

    let img = ctx.getImageData(0,0,canvas.width,canvas.height);
    let d = img.data;

    let contrastValue = 80;

    for(let i=0;i<d.length;i+=4){

        let gray =
        0.299*d[i] +
        0.587*d[i+1] +
        0.114*d[i+2];

        gray = (gray-128)*(contrastValue/80)+128;

        if(edgeMode){
            gray = Math.abs(gray-128)*3.2;
        }

        gray = gray > 160 ? 255 : 0;

        d[i]=d[i+1]=d[i+2]=gray;
    }

    ctx.putImageData(img,0,0);

    requestAnimationFrame(render);
}

</script>

</body>
</html>
